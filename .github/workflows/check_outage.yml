name: 台電停電每日查詢

on:
  schedule:
    # 每天台灣時間 00:00 執行（UTC 16:00）
    - cron: '0 16 * * *'
  workflow_dispatch:
    # 允許手動觸發，測試時用這個，不必等到凌晨

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run outage check
        env:
          TARGET_ADDRESS:     ${{ vars.TARGET_ADDRESS }}
          RECIPIENT_EMAIL:    ${{ vars.RECIPIENT_EMAIL }}
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          CHECK_DAYS:         ${{ vars.CHECK_DAYS }}
        run: python check_outage.py
